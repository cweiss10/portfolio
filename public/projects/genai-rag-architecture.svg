<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Persona-Aware RAG Architecture</title>
  <desc id="desc">Flow diagram showing user query routing, retrieval, reranking, prompt templates, and generation for engineering and marketing personas.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#121a2c" />
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" rx="24" />

  <text x="600" y="56" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="28" text-anchor="middle" font-weight="700">
    Persona-Aware RAG Assistant
  </text>
  <text x="600" y="86" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">
    UC Berkeley DATASCI 267 Final Project
  </text>

  <rect x="64" y="150" width="170" height="90" rx="14" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="149" y="188" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">User Query</text>
  <text x="149" y="212" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">Engineer or Marketer</text>

  <rect x="294" y="130" width="220" height="130" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2" />
  <text x="404" y="166" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Retriever</text>
  <text x="404" y="192" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Qdrant + MMR</text>
  <text x="404" y="214" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">k=20, fetch_k=30</text>

  <rect x="574" y="130" width="220" height="130" rx="14" fill="#0f172a" stroke="#34d399" stroke-width="2" />
  <text x="684" y="166" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Reranker</text>
  <text x="684" y="192" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Cohere Rerank</text>
  <text x="684" y="214" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">top_n=12</text>

  <rect x="854" y="130" width="282" height="130" rx="14" fill="#0f172a" stroke="#f59e0b" stroke-width="2" />
  <text x="995" y="166" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Prompt Router</text>
  <text x="995" y="192" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Engineering Template</text>
  <text x="995" y="214" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Marketing Template</text>

  <rect x="372" y="338" width="456" height="138" rx="16" fill="#111827" stroke="url(#primary)" stroke-width="3" />
  <text x="600" y="377" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="20" text-anchor="middle" font-weight="700">Generator LLM</text>
  <text x="600" y="405" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">mistralai/Mistral-7B-Instruct-v0.2</text>
  <text x="600" y="430" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">temperature=0.4 | top_p=0.95 | max_new_tokens=500</text>

  <rect x="90" y="546" width="460" height="122" rx="14" fill="#0f172a" stroke="#38bdf8" stroke-width="2" />
  <text x="320" y="580" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Engineering Output</text>
  <text x="320" y="605" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Technical detail, grounded answers, up to 5 sentences</text>

  <rect x="650" y="546" width="460" height="122" rx="14" fill="#0f172a" stroke="#f59e0b" stroke-width="2" />
  <text x="880" y="580" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Marketing Output</text>
  <text x="880" y="605" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Plain language, intent-focused, concise response style</text>

  <line x1="234" y1="195" x2="294" y2="195" stroke="#64748b" stroke-width="3" />
  <line x1="514" y1="195" x2="574" y2="195" stroke="#64748b" stroke-width="3" />
  <line x1="794" y1="195" x2="854" y2="195" stroke="#64748b" stroke-width="3" />
  <line x1="995" y1="260" x2="995" y2="338" stroke="#64748b" stroke-width="3" />
  <line x1="600" y1="476" x2="320" y2="546" stroke="#64748b" stroke-width="3" />
  <line x1="600" y1="476" x2="880" y2="546" stroke="#64748b" stroke-width="3" />

  <rect x="64" y="274" width="246" height="220" rx="16" fill="#111827" stroke="url(#accent)" stroke-width="2" />
  <text x="187" y="308" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Knowledge Corpus</text>
  <text x="187" y="334" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">ArXiv Papers</text>
  <text x="187" y="356" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Lilian Weng Blogs</text>
  <text x="187" y="378" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Wikipedia Pages</text>
  <text x="187" y="408" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">Paragraph chunking</text>
  <text x="187" y="428" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">multi-qa-mpnet-base-dot-v1 embeddings</text>

  <line x1="310" y1="365" x2="404" y2="240" stroke="#64748b" stroke-width="2.5" stroke-dasharray="7 7" />

  <rect x="890" y="338" width="246" height="138" rx="14" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="1013" y="370" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Evaluation</text>
  <text x="1013" y="396" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Groundedness</text>
  <text x="1013" y="416" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Relevance / Accuracy</text>
  <text x="1013" y="436" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Coherence / Similarity</text>
</svg>
