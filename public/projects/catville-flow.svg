<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Catville Daily Simulation Loop</title>
  <desc id="desc">Diagram showing agent simulation, memory updates, daily summarization, and newsletter publishing workflow for Catville.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="loop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="24" fill="url(#bg)" />

  <text x="600" y="58" fill="#e5e7eb" font-family="Arial, Helvetica, sans-serif" font-size="30" text-anchor="middle" font-weight="700">
    Catville: Autonomous Daily Social Simulation
  </text>
  <text x="600" y="86" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle">
    Inspired by Generative Agents (Stanford + Google)
  </text>

  <rect x="90" y="170" width="230" height="130" rx="14" fill="#0b1220" stroke="#334155" stroke-width="2" />
  <text x="205" y="210" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle" font-weight="700">Agent Planning</text>
  <text x="205" y="236" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Daily intentions</text>
  <text x="205" y="257" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Goal selection</text>

  <rect x="375" y="170" width="230" height="130" rx="14" fill="#0b1220" stroke="#334155" stroke-width="2" />
  <text x="490" y="210" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle" font-weight="700">Interaction Loop</text>
  <text x="490" y="236" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Agent-to-agent actions</text>
  <text x="490" y="257" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Emergent narrative</text>

  <rect x="660" y="170" width="230" height="130" rx="14" fill="#0b1220" stroke="#334155" stroke-width="2" />
  <text x="775" y="210" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle" font-weight="700">Memory + State</text>
  <text x="775" y="236" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Persist events</text>
  <text x="775" y="257" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">JSON state updates</text>

  <rect x="945" y="170" width="170" height="130" rx="14" fill="#0b1220" stroke="#334155" stroke-width="2" />
  <text x="1030" y="210" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="middle" font-weight="700">LLM</text>
  <text x="1030" y="236" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Ollama +</text>
  <text x="1030" y="257" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Mistral</text>

  <path d="M320 235 L375 235" stroke="#64748b" stroke-width="3" />
  <path d="M605 235 L660 235" stroke="#64748b" stroke-width="3" />
  <path d="M890 235 L945 235" stroke="#64748b" stroke-width="3" />

  <path d="M1030 300 C1030 360, 820 380, 775 330" fill="none" stroke="url(#loop)" stroke-width="3.5" />
  <path d="M776 330 l12 -7 l-3 14" fill="#60a5fa" />

  <rect x="140" y="410" width="920" height="210" rx="18" fill="#0b1220" stroke="#22d3ee" stroke-width="2" />
  <text x="600" y="450" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="22" text-anchor="middle" font-weight="700">Daily Summary and Publishing Pipeline</text>

  <rect x="190" y="485" width="250" height="95" rx="12" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="315" y="523" fill="#e5e7eb" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle" font-weight="700">Summarization</text>
  <text x="315" y="546" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">Generate daily narrative</text>

  <rect x="475" y="485" width="250" height="95" rx="12" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="600" y="523" fill="#e5e7eb" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle" font-weight="700">Markdown Archive</text>
  <text x="600" y="546" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">Write to logs and summaries/</text>

  <rect x="760" y="485" width="250" height="95" rx="12" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="885" y="523" fill="#e5e7eb" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle" font-weight="700">Newsletter Publish</text>
  <text x="885" y="546" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">Buttondown API delivery</text>

  <path d="M440 533 L475 533" stroke="#64748b" stroke-width="3" />
  <path d="M725 533 L760 533" stroke="#64748b" stroke-width="3" />
</svg>
