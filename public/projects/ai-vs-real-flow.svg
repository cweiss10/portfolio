<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI vs Real Image Classifier Pipeline</title>
  <desc id="desc">Data loading, preprocessing, augmentation, CNN training, and evaluation workflow for image authenticity classification.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="24" fill="url(#bg)" />

  <text x="600" y="58" fill="#e5e7eb" font-family="Arial, Helvetica, sans-serif" font-size="30" text-anchor="middle" font-weight="700">
    AI vs Real Image Classifier
  </text>
  <text x="600" y="86" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle">
    MIDS 207 Coursework Project
  </text>

  <rect x="70" y="160" width="230" height="125" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="185" y="199" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Data Ingestion</text>
  <text x="185" y="224" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Load image files</text>
  <text x="185" y="246" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Binary labels: fake / real</text>

  <rect x="340" y="160" width="230" height="125" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="455" y="199" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Preprocessing</text>
  <text x="455" y="224" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Resize + normalize</text>
  <text x="455" y="246" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Create train/val/test subset</text>

  <rect x="610" y="160" width="230" height="125" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="725" y="199" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Augmentation</text>
  <text x="725" y="224" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Brightness + contrast</text>
  <text x="725" y="246" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Horizontal flips</text>

  <rect x="880" y="160" width="250" height="125" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="1005" y="199" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Model Training</text>
  <text x="1005" y="224" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Baseline CNN in Keras</text>
  <text x="1005" y="246" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Hyperparameter experiments</text>

  <line x1="300" y1="223" x2="340" y2="223" stroke="#64748b" stroke-width="3" />
  <line x1="570" y1="223" x2="610" y2="223" stroke="#64748b" stroke-width="3" />
  <line x1="840" y1="223" x2="880" y2="223" stroke="#64748b" stroke-width="3" />

  <rect x="120" y="355" width="960" height="270" rx="18" fill="#0f172a" stroke="url(#line)" stroke-width="3" />

  <text x="600" y="396" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="23" text-anchor="middle" font-weight="700">Evaluation Findings</text>

  <rect x="170" y="430" width="410" height="160" rx="12" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="375" y="462" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Baseline CNN (Best in Notebook)</text>
  <text x="375" y="488" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Train accuracy: ~0.996</text>
  <text x="375" y="510" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Validation accuracy: ~0.672</text>
  <text x="375" y="532" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Test accuracy: ~0.681</text>
  <text x="375" y="557" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">Indicates strong fitting with generalization gap</text>

  <rect x="620" y="430" width="410" height="160" rx="12" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="825" y="462" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Tuned Variant</text>
  <text x="825" y="488" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Train accuracy: ~0.594</text>
  <text x="825" y="510" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Validation accuracy: ~0.560</text>
  <text x="825" y="532" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Test accuracy: ~0.589</text>
  <text x="825" y="557" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">Tradeoff exploration did not outperform baseline</text>
</svg>
