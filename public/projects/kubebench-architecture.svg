<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KubeBench Architecture</title>
  <desc id="desc">High-level architecture showing KubeBench task generation, model candidates, runtime evaluation on Kubernetes, scoring, and serving stack.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>

  <rect width="1200" height="760" rx="24" fill="url(#bg)" />

  <text x="600" y="58" fill="#e5e7eb" font-family="Arial, Helvetica, sans-serif" font-size="30" text-anchor="middle" font-weight="700">
    KubeBench: Kubernetes-Native LLM Benchmark + Serving Platform
  </text>
  <text x="600" y="86" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle">
    Master's Capstone Thesis (MIDS)
  </text>

  <rect x="70" y="140" width="250" height="120" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="195" y="178" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Task Generation</text>
  <text x="195" y="203" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">K8s workload scenarios</text>
  <text x="195" y="224" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Instruction/response datasets</text>

  <rect x="365" y="140" width="250" height="120" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="490" y="178" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Model Candidates</text>
  <text x="490" y="203" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Qwen / Gemma variants</text>
  <text x="490" y="224" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">QLoRA fine-tuning</text>

  <rect x="660" y="140" width="250" height="120" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="785" y="178" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Runtime Evaluator</text>
  <text x="785" y="203" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Apply generated YAML</text>
  <text x="785" y="224" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Minikube + GKE validation</text>

  <rect x="955" y="140" width="175" height="120" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="1042" y="178" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" font-weight="700">Scoring</text>
  <text x="1042" y="203" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Operational +</text>
  <text x="1042" y="224" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">LLM judge metrics</text>

  <line x1="320" y1="200" x2="365" y2="200" stroke="#64748b" stroke-width="3" />
  <line x1="615" y1="200" x2="660" y2="200" stroke="#64748b" stroke-width="3" />
  <line x1="910" y1="200" x2="955" y2="200" stroke="#64748b" stroke-width="3" />

  <rect x="95" y="330" width="1010" height="185" rx="18" fill="#0f172a" stroke="url(#a)" stroke-width="3" />
  <text x="600" y="368" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="22" text-anchor="middle" font-weight="700">Serving and Inference Stack</text>

  <rect x="140" y="400" width="255" height="88" rx="12" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="267" y="433" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle" font-weight="700">Frontend + Proxy</text>
  <text x="267" y="454" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">DigitalOcean App Platform</text>

  <rect x="472" y="400" width="255" height="88" rx="12" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="599" y="433" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle" font-weight="700">Model Backend</text>
  <text x="599" y="454" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">FastAPI on GCP GPU VM</text>

  <rect x="804" y="400" width="255" height="88" rx="12" fill="#111827" stroke="#334155" stroke-width="2" />
  <text x="931" y="433" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle" font-weight="700">Infra + CI/CD</text>
  <text x="931" y="454" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">Terraform + GitHub Actions</text>

  <line x1="395" y1="444" x2="472" y2="444" stroke="#64748b" stroke-width="3" />
  <line x1="727" y1="444" x2="804" y2="444" stroke="#64748b" stroke-width="3" />

  <rect x="70" y="555" width="1060" height="140" rx="16" fill="#0f172a" stroke="#334155" stroke-width="2" />
  <text x="600" y="590" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="20" text-anchor="middle" font-weight="700">Evaluation Philosophy</text>
  <text x="600" y="618" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">
    Score model outputs by executable Kubernetes correctness, then combine with quality rubrics.
  </text>
  <text x="600" y="642" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">
    Prioritizes real cluster behavior over string-match metrics for production relevance.
  </text>
</svg>
